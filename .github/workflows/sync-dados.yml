name: Sync Excel Data

on:
  schedule:
    - cron: '0 */2 * * *'  # a cada 2 horas
  workflow_dispatch:         # permite rodar manualmente pelo GitHub quando quiser

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Baixar Excel do Google Sheets
        run: |
          FILE_ID="1PeSi0A7m8YfUsoSkovA5iS79SkQAIip9"
          python3 - <<'PYEOF'
          import requests, sys, re, os

          file_id = "1PeSi0A7m8YfUsoSkovA5iS79SkQAIip9"
          url = f"https://docs.google.com/spreadsheets/d/{file_id}/export?format=xlsx"

          session = requests.Session()
          headers = {"User-Agent": "Mozilla/5.0 (compatible; GitHub-Actions-DataSync/1.0)"}

          print(f"Baixando: {url}")
          r = session.get(url, headers=headers, allow_redirects=True, timeout=60)
          print(f"Status: {r.status_code}, tamanho: {len(r.content)} bytes")

          content = r.content

          # Se Google retornou página de confirmação (arquivo grande), extrair token e rebaixar
          if r.status_code == 200 and content[:4] != b'PK\x03\x04':
              html = content.decode('utf-8', errors='ignore')
              if 'confirm' in html or 'download_warning' in html:
                  print("Página de confirmação detectada, extraindo token...")
                  token_match = re.search(r'confirm=([^&"\'>\s]+)', html)
                  if token_match:
                      token = token_match.group(1)
                      confirm_url = f"{url}&confirm={token}"
                      print(f"Re-baixando com token: {token}")
                      r2 = session.get(confirm_url, headers=headers, allow_redirects=True, timeout=60)
                      content = r2.content
                      print(f"Status confirmação: {r2.status_code}, tamanho: {len(content)} bytes")

          # Verificar se é XLSX válido (magic bytes PK)
          if content[:2] != b'PK':
              print("ERRO: Conteúdo baixado não é um XLSX válido.")
              print("Primeiros 500 bytes:")
              print(content[:500].decode('utf-8', errors='replace'))
              sys.exit(1)

          with open("dados.xlsx", "wb") as f:
              f.write(content)

          size_kb = len(content) / 1024
          print(f"XLSX salvo com sucesso: {size_kb:.1f} KB")
          PYEOF

      - name: Commit e push se houver mudança
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados.xlsx
          if git diff --staged --quiet; then
            echo "Sem mudanças. Nenhum commit necessário."
          else
            git commit -m "auto: atualiza dados $(date +'%d/%m/%Y %H:%M') UTC"
            git push
            echo "Dados atualizados com sucesso."
          fi
